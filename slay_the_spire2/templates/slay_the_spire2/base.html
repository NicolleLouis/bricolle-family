{% load bootstrap5 %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slay The Spire 2</title>
    {% bootstrap_css %}
    {% bootstrap_javascript %}
</head>
<body>
{% include "slay_the_spire2/header.html" %}
<main class="container py-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    {% block content %}
    {% endblock %}
</main>
</body>
</html>
